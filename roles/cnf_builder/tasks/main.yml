- name: Install docker using microdnf
  command: microdnf install -y docker

- name: Start Docker daemon in background
  shell: dockerd > /tmp/dockerd.log 2>&1 &
  async: 0
  poll: 0

- name: Wait for Docker socket to be ready
  wait_for:
    path: /var/run/docker.sock
    timeout: 30

- name: Add current user to docker group
  command: usermod -aG docker root

- name: Clone application repository
  git:
    repo: "{{ app_repo }}"
    dest: "/tmp/cnf_app"
    version: "{{ app_branch }}"
    force: yes

- name: Build Docker image
  command: docker build -t "{{ image_name }}:{{ image_tag }}" /tmp/cnf_app