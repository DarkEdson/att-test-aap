- name: Find package managers and key tools
  shell: ls /usr/bin/ /usr/local/bin/ /bin/ /sbin/ /usr/sbin/ 2>/dev/null | grep -E "^(pip|dnf|yum|apt|microdnf|docker|git|apk)"
  register: tools
  changed_when: false
  failed_when: false

- name: Show relevant tools
  debug:
    msg: "{{ tools.stdout_lines }}"